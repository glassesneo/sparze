name: Zig CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Zig
        run: |
          curl -L https://ziglang.org/download/0.15.1/zig-x86_64-linux-0.15.1.tar.xz | tar -xJ
          sudo mv zig-x86_64-linux-0.15.1 /usr/local/zig
          sudo ln -s /usr/local/zig/zig /usr/local/bin/zig
      - name: Format Code
        run: zig fmt src
      - name: Check for formatting changes
        id: verify-changed-files
        run: |
          if git diff --quiet; then
            echo "No formatting changes needed"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Formatting changes detected"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Commit and push formatting changes
        if: github.event_name == 'push' && steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: auto-format code with zig fmt [skip ci]"
          git push
      - name: Setup wasmtime
        uses: bytecodealliance/actions/wasmtime/setup@v1
      - name: Wasmtime version
        run: wasmtime --version
      - name: Run Tests
        run: |
          zig test src/root.zig
      - name: Run Wasm Tests (WASI)
        run: |
          zig build test-wasm
      - name: Build Examples
        run: |
          zig build examples
      - name: Run Examples
        run: |
          zig build run-examples
      - name: Run Performance Benchmarks
        run: |
          echo "=== Running Performance Benchmarks ===" > benchmark_results.txt
          echo "" >> benchmark_results.txt
          echo "--- Reserve Benchmark ---" >> benchmark_results.txt
          zig build run-reserve_benchmark >> benchmark_results.txt 2>&1 || true
          echo "" >> benchmark_results.txt
          echo "--- Performance Benchmark ---" >> benchmark_results.txt
          zig build run-performance_benchmark >> benchmark_results.txt 2>&1 || true
          echo "" >> benchmark_results.txt
          echo "--- Performance Bottleneck Benchmark ---" >> benchmark_results.txt
          zig build run-performance_bottleneck_benchmark >> benchmark_results.txt 2>&1 || true
          echo "" >> benchmark_results.txt
          cat benchmark_results.txt
      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results.txt
          retention-days: 30
